<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minhaj Ahammed — Frontend Engineer</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
</head>
<body>

  <header id="topbar">
    <div class="wrap topbar-inner">
      <a class="logo" id="logo" href="#hero"></a>
      <nav id="nav"></nav>
      <div id="avail-badge" class="avail-badge">
        <span class="avail-dot"></span><span>Available</span>
      </div>
    </div>
  </header>

  <!-- ── HERO ──────────────────────────────── -->
  <section id="hero">
    <div class="wrap hero-wrap">
      <div class="hero-kicker" id="hero-kicker"></div>
      <h1 class="hero-heading" id="hero-heading"></h1>
      <p class="hero-sub" id="hero-sub"></p>
      <div class="hero-actions">
        <a class="btn-solid" href="#work">See my work</a>
        <a class="btn-line"  href="#contact">Let's talk</a>
      </div>
    </div>
    <div class="hero-stripe"></div>
  </section>

  <!-- ── STATS BAR ─────────────────────────── -->
  <div class="stats-bar">
    <div class="wrap stats-inner" id="stats-inner"></div>
  </div>

  <!-- ── SKILLS ────────────────────────────── -->
  <section id="stack">
    <div class="wrap">
      <div class="sec-label">Skills</div>
      <h2 class="sec-heading">Tools I build with</h2>
      <div class="tech-grid" id="tech-grid"></div>
      <div class="soft-chips" id="soft-chips"></div>
    </div>
  </section>

  <!-- ── PROJECTS ──────────────────────────── -->
  <section id="work" class="sec-alt">
    <div class="wrap">
      <div class="sec-label">Projects</div>
      <h2 class="sec-heading">Selected work</h2>
      <div id="proj-list"></div>
    </div>
  </section>

  <!-- ── EXPERIENCE ────────────────────────── -->
  <section id="exp">
    <div class="wrap">
      <div class="sec-label">Experience</div>
      <h2 class="sec-heading">Where I've worked</h2>
      <div id="exp-list"></div>
    </div>
  </section>

  <!-- ── EDUCATION ─────────────────────────── -->
  <section id="edu" class="sec-alt">
    <div class="wrap">
      <div class="sec-label">Education</div>
      <h2 class="sec-heading">Background</h2>
      <div class="edu-row" id="edu-row"></div>
    </div>
  </section>

  <!-- ── CONTACT ───────────────────────────── -->
  <section id="contact" class="sec-contact">
    <div class="wrap contact-wrap">
      <div class="contact-left">
        <div class="sec-label light">Contact</div>
        <h2 class="contact-heading">Let's build something<br/><em>great</em> together.</h2>
        <p class="contact-sub" id="contact-sub"></p>
      </div>
      <div class="contact-cards" id="contact-cards"></div>
    </div>
  </section>

  <footer>
    <div class="wrap footer-inner">
      <span id="footer-name"></span>
      <span class="footer-mid"><span class="avail-dot"></span>Open to opportunities</span>
      <span id="footer-loc"></span>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
