<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Count Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 40px 60px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    #count {
      font-size: 4rem;
      font-weight: bold;
      margin-top: 20px;
    }

    .loading {
      font-size: 1.2rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Total Users</h1>
    <div id="count" class="loading">Loading...</div>
  </div>

  <script>
    async function fetchUserCount() {
      try {
        const response = await fetch("/user-count");
        const data = await response.json();
        const countEl = document.getElementById("count");
        countEl.textContent = data.totalUser;
        countEl.classList.remove("loading");
      } catch (err) {
        document.getElementById("count").textContent = "Error";
      }
    }

    fetchUserCount();
  </script>

</body>
</html>
